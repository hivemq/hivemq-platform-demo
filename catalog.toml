[versions]
dagger = "2.59.2"
junit = "6.1.0"
okhttp = "5.4.0"
retrofit = "3.0.0"
rxjava = "3.1.12"
lombok = "1.18.46"
slf4j = "2.0.18"
jackson = "2.22.0"
docker-java = "3.7.1"
hivemq-mqtt = "1.3.15"
axion = "1.21.2"
spotless = "8.6.0"
graalvm = "1.1.2"

[plugins]

axion-release = { id = "pl.allegro.tech.build.axion-release", version.ref = "axion" }
spotless = { id = "com.diffplug.spotless", version.ref = "spotless" }
graalvm-native = { id = "org.graalvm.buildtools.native", version.ref = "graalvm" }

[libraries]

dagger = { module = "com.google.dagger:dagger", version.ref = "dagger" }
dagger-compiler = { module = "com.google.dagger:dagger-compiler", version.ref = "dagger" }

junit-bom = { module = "org.junit:junit-bom", version.ref = "junit" }
junit-jupiter = { module = "org.junit.jupiter:junit-jupiter" }
junit-platform-launcher = { module = "org.junit.platform:junit-platform-launcher" }

okhttp-bom = { module = "com.squareup.okhttp3:okhttp-bom", version.ref = "okhttp" }
okhttp = { module = "com.squareup.okhttp3:okhttp" }
okhttp-logging = { module = "com.squareup.okhttp3:logging-interceptor" }

retrofit-bom = { module = "com.squareup.retrofit2:retrofit-bom", version.ref = "retrofit" }
retrofit = { module = "com.squareup.retrofit2:retrofit" }
retrofit-jackson = { module = "com.squareup.retrofit2:converter-jackson" }
retrofit-rxjava3 = { module = "com.squareup.retrofit2:adapter-rxjava3" }

rxjava = { module = "io.reactivex.rxjava3:rxjava", version.ref = "rxjava" }

lombok = { module = "org.projectlombok:lombok", version.ref = "lombok" }

slf4j-bom = { module = "org.slf4j:slf4j-bom", version.ref = "slf4j" }
slf4j-api = { module = "org.slf4j:slf4j-api" }
slf4j-simple = { module = "org.slf4j:slf4j-simple" }

jackson-bom = { module = "com.fasterxml.jackson:jackson-bom", version.ref = "jackson" }
jackson-databind = { module = "com.fasterxml.jackson.core:jackson-databind" }
jackson-jsr310 = { module = "com.fasterxml.jackson.datatype:jackson-datatype-jsr310" }
jackson-toml = { module = "com.fasterxml.jackson.dataformat:jackson-dataformat-toml" }
jackson-yaml = { module = "com.fasterxml.jackson.dataformat:jackson-dataformat-yaml" }

docker-java-bom = { module = "com.github.docker-java:docker-java-bom", version.ref = "docker-java" }
docker-java-core = { module = "com.github.docker-java:docker-java-core" }
docker-java-transport-httpclient5 = { module = "com.github.docker-java:docker-java-transport-httpclient5" }

hivemq-mqtt-client = { module = "com.hivemq:hivemq-mqtt-client", version.ref = "hivemq-mqtt" }

